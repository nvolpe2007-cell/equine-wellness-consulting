    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is equine bodywork?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Equine bodywork is a non-invasive, hands-on approach designed to support a horse's muscular comfort, flexibility, and overall well-being. It draws on a combination of techniques — including sports massage and complementary modalities such as PEMF, red light, cold laser, TENS, and TECAR — and is offered as wellness support, not medical care."
          }
        },
        {
          "@type": "Question",
          "name": "Is this a substitute for veterinary care?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Susie H. Lytal is an Equine Biomechanist and Certified Equine Sports Massage Therapist — not a veterinarian. Wellness sessions do not diagnose, treat, cure, or prescribe for any medical condition. We work alongside your primary veterinarian as part of a team approach to your horse's health."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a session take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A typical session lasts approximately 60 to 90 minutes, depending on the horse and the modalities included. Susie tailors each session to the individual horse's needs, often combining hands-on massage with one or more complementary modalities."
          }
        },
        {
          "@type": "Question",
          "name": "Which modalities are offered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Six modalities are offered: Equine Sports Massage, PEMF (Magnawave), Red Light (RevitaVet), Cold Laser, TENS (TrueStim), and TECAR. Each is integrated thoughtfully based on the horse's response and biomechanical needs."
          }
        },
        {
          "@type": "Question",
          "name": "How often should my horse have a session?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Frequency depends on the horse's workload, age, and goals. Performance horses in heavy training often benefit from regular sessions, while companion horses may do well with periodic maintenance sessions. Susie can recommend a cadence after the first session."
          }
        },
        {
          "@type": "Question",
          "name": "How do I book a session?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Call or text Susie directly at (310) 488-4389 to discuss your horse's needs and schedule a visit."
          }
        }
      ]
