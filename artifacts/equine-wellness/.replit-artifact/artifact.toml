kind = "web"
previewPath = "/"
title = "Equine Bodywork and Wellness Consulting"
version = "1.0.0"
id = "artifacts/equine-wellness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21738

[services.development]
run = "pnpm --filter @workspace/equine-wellness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/equine-wellness", "run", "build" ]
publicDir = "artifacts/equine-wellness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21738"
BASE_PATH = "/"
